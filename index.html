<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mesh - Legal</title>
  <meta name="description" content="Documenti legali di Mesh" />
  <style>
    :root { --bg:#0b1210; --card:#13211d; --text:#e8fff4; --muted:#a9c6b7; --accent:#60f5b0; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: radial-gradient(circle at 20% 0%, #163528, var(--bg) 45%); color:var(--text); }
    main { max-width: 860px; margin: 48px auto; padding: 0 16px; }
    .card { background: linear-gradient(180deg, #193328, var(--card)); border:1px solid #27503f; border-radius:16px; padding:24px; }
    h1 { margin:0 0 8px; font-size: 34px; }
    p { color:var(--muted); line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; font-weight: 600; }
    ul { line-height: 1.8; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>Mesh</h1>
      <p>Documentazione legale ufficiale dell'app Mesh.</p>
      <ul>
        <li><a href="./privacy-policy.html">Privacy Policy</a></li>
      </ul>
      <p>Ultimo aggiornamento: 3 marzo 2026.</p>
    </section>
  </main>
</body>
</html>
